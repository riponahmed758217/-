<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>টোকেন খাতা প্রো - V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans Bengali', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .page { display: none; animation: fadeIn 0.3s ease-out; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Custom UI tweaks */
        .bottom-nav {
            padding-bottom: env(safe-area-inset-bottom);
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px #4f46e5;
        }
        /* Hidden scrollbar but scrollable */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 leading-tight">

    <!-- Header -->
    <header class="bg-indigo-700 text-white p-4 sticky top-0 z-50 shadow-lg flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i data-lucide="package" class="w-6 h-6"></i>
            <h1 class="text-xl font-bold" id="header-title">টোকেন খাতা প্রো</h1>
        </div>
        <button onclick="navigate('settings')" class="p-2 hover:bg-indigo-600 rounded-full">
            <i data-lucide="trash-2" class="w-5 h-5 text-indigo-100"></i>
        </button>
    </header>

    <main class="max-w-md mx-auto p-4 pb-24">
        
        <!-- Home Page -->
        <div id="page-home" class="page active-page space-y-4">
            <!-- Main Stock Card -->
            <div class="bg-gradient-to-br from-indigo-600 to-blue-700 rounded-3xl p-6 text-white shadow-xl relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10">
                    <i data-lucide="trending-up" class="w-24 h-24"></i>
                </div>
                <div class="relative z-10">
                    <p class="text-indigo-100 text-sm font-medium">বর্তমানে স্টকে আছে</p>
                    <h2 class="text-4xl font-bold mt-1 tracking-tight"><span id="m-stock">0</span> <span class="text-lg font-normal">টি টোকেন</span></h2>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                    <div class="p-2 bg-indigo-50 text-indigo-600 rounded-lg w-fit mb-2"><i data-lucide="wallet" class="w-4 h-4"></i></div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">নগদ টাকা</p>
                    <p class="text-lg font-bold text-indigo-600" id="m-cash">৳ ০</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                    <div class="p-2 bg-emerald-50 text-emerald-600 rounded-lg w-fit mb-2"><i data-lucide="trending-up" class="w-4 h-4"></i></div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">মোট লাভ</p>
                    <p class="text-lg font-bold text-emerald-600" id="m-profit">৳ ০</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                    <div class="p-2 bg-rose-50 text-rose-600 rounded-lg w-fit mb-2"><i data-lucide="arrow-up-circle" class="w-4 h-4"></i></div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">মোট দেনা</p>
                    <p class="text-lg font-bold text-rose-600" id="m-dena">৳ ০</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                    <div class="p-2 bg-amber-50 text-amber-600 rounded-lg w-fit mb-2"><i data-lucide="arrow-down-circle" class="w-4 h-4"></i></div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">মোট পাওনা</p>
                    <p class="text-lg font-bold text-amber-600" id="m-paona">৳ ০</p>
                </div>
            </div>

            <!-- Balances Section -->
            <div class="space-y-3 pt-2">
                <h3 class="font-bold text-slate-800 text-lg">বাকি ও পাওনার তালিকা</h3>
                <div id="balance-list" class="space-y-2">
                    <!-- Balances injected here -->
                </div>
            </div>
        </div>

        <!-- Buy Form -->
        <div id="page-buy" class="page">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 space-y-4">
                <h2 class="text-xl font-bold text-slate-800 border-b border-slate-50 pb-4 flex items-center gap-2">
                    <i data-lucide="plus-circle" class="text-rose-500"></i> টোকেন ক্রয় (মহাজন)
                </h2>
                <div class="space-y-3">
                    <input type="date" id="buy-date" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm">
                    <input type="text" id="buy-name" placeholder="মহাজনের নাম" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="buy-qty" placeholder="পরিমাণ (Qty)" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm">
                        <input type="number" id="buy-total" placeholder="মোট ক্রয় মূল্য" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm">
                    </div>
                    <input type="number" id="buy-paid" placeholder="নগদ কত দিলেন?" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm">
                    <button onclick="saveEntry('buy')" class="w-full bg-rose-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-rose-200 active:scale-95 transition-transform flex justify-center items-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i> সেভ করুন
                    </button>
                </div>
            </div>
        </div>

        <!-- Sell Form -->
        <div id="page-sell" class="page">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 space-y-4">
                <h2 class="text-xl font-bold text-slate-800 border-b border-slate-50 pb-4 flex items-center gap-2">
                    <i data-lucide="minus-circle" class="text-emerald-500"></i> টোকেন বিক্রি (কাস্টমার)
                </h2>
                <div class="space-y-3">
                    <input type="date" id="sell-date" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm">
                    <input type="text" id="sell-name" placeholder="কাস্টমারের নাম" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="sell-qty" placeholder="পরিমাণ (Qty)" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm">
                        <input type="number" id="sell-total" placeholder="মোট বিক্রয় মূল্য" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm">
                    </div>
                    <input type="number" id="sell-rec" placeholder="নগদ কত পেলেন?" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm">
                    <button onclick="saveEntry('sell')" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-emerald-200 active:scale-95 transition-transform flex justify-center items-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i> সেভ করুন
                    </button>
                </div>
            </div>
        </div>

        <!-- Expense Form -->
        <div id="page-expense" class="page">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 space-y-4">
                <h2 class="text-xl font-bold text-slate-800 border-b border-slate-50 pb-4 flex items-center gap-2">
                    <i data-lucide="wallet" class="text-indigo-500"></i> অন্যান্য খরচ
                </h2>
                <div class="space-y-3">
                    <input type="date" id="exp-date" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm">
                    <input type="text" id="exp-name" placeholder="খরচের বিবরণ" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm">
                    <input type="number" id="exp-amount" placeholder="টাকার পরিমাণ" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm">
                    <button onclick="saveEntry('expense')" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-indigo-200 active:scale-95 transition-transform flex justify-center items-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i> সেভ করুন
                    </button>
                </div>
            </div>
        </div>

        <!-- Report Page -->
        <div id="page-report" class="page space-y-4">
            <button onclick="downloadCSV()" class="w-full bg-slate-800 text-white p-4 rounded-2xl font-bold flex items-center justify-center gap-2 text-sm shadow-sm transition-transform active:scale-95">
                <i data-lucide="download" class="w-4 h-4"></i> CSV রিপোর্ট ডাউনলোড করুন
            </button>
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                <input type="text" id="search-input" onkeyup="renderTransactions()" placeholder="লেনদেন খুঁজুন..." class="w-full bg-white border border-slate-200 rounded-2xl p-3 pl-10 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            
            <div class="flex items-center justify-between px-1">
                <h3 class="text-sm font-bold text-slate-600">সাম্প্রতিক লেনদেন</h3>
                <span id="res-count" class="text-[10px] bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full font-bold">০ টি</span>
            </div>

            <div id="history-container" class="space-y-3">
                <!-- Transactions list -->
            </div>
        </div>

        <!-- Settings/Reset -->
        <div id="page-settings" class="page space-y-6 text-center">
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                <div class="w-20 h-20 bg-rose-50 text-rose-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="alert-triangle" class="w-10 h-10"></i>
                </div>
                <h2 class="text-xl font-bold text-slate-800">ডাটা রিসেট</h2>
                <p class="text-slate-500 text-sm mt-2">আপনি কি নিশ্চিত সব ডাটা মুছে ফেলতে চান? এটি আর ফিরিয়ে আনা যাবে না।</p>
                <div class="space-y-3 mt-6">
                    <button onclick="clearAllData()" class="w-full bg-rose-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-rose-200">সব ডাটা মুছুন</button>
                    <button onclick="downloadApp()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-indigo-200 flex items-center justify-center gap-2">
                        <i data-lucide="download" class="w-5 h-5"></i> পুরো অ্যাপটি ডাউনলোড করুন
                    </button>
                </div>
            </div>
            <button onclick="navigate('home')" class="text-slate-500 font-medium">ফিরে যান</button>
        </div>

    </main>

    <!-- Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 pb-safe shadow-[0_-4px_12px_rgba(0,0,0,0.03)] z-50">
        <div class="max-w-md mx-auto flex justify-around">
            <button onclick="navigate('home')" class="nav-btn active flex flex-col items-center py-3 px-2 flex-1 text-indigo-600" data-page="home">
                <i data-lucide="layout-dashboard" class="w-5 h-5 mb-1"></i>
                <span class="text-[10px] font-bold">হোম</span>
            </button>
            <button onclick="navigate('buy')" class="nav-btn flex flex-col items-center py-3 px-2 flex-1 text-slate-400" data-page="buy">
                <i data-lucide="plus-circle" class="w-5 h-5 mb-1"></i>
                <span class="text-[10px] font-bold">ক্রয়</span>
            </button>
            <button onclick="navigate('sell')" class="nav-btn flex flex-col items-center py-3 px-2 flex-1 text-slate-400" data-page="sell">
                <i data-lucide="minus-circle" class="w-5 h-5 mb-1"></i>
                <span class="text-[10px] font-bold">বিক্রি</span>
            </button>
            <button onclick="navigate('expense')" class="nav-btn flex flex-col items-center py-3 px-2 flex-1 text-slate-400" data-page="expense">
                <i data-lucide="wallet" class="w-5 h-5 mb-1"></i>
                <span class="text-[10px] font-bold">খরচ</span>
            </button>
            <button onclick="navigate('report')" class="nav-btn flex flex-col items-center py-3 px-2 flex-1 text-slate-400" data-page="report">
                <i data-lucide="history" class="w-5 h-5 mb-1"></i>
                <span class="text-[10px] font-bold">রিপোর্ট</span>
            </button>
        </div>
    </nav>

    <script>
        let transactions = JSON.parse(localStorage.getItem('token_khata_pro_pwa')) || [];

        function navigate(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById('page-' + pageId).classList.add('active-page');
            
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('text-indigo-600');
                b.classList.add('text-slate-400');
                if(b.dataset.page === pageId) {
                    b.classList.remove('text-slate-400');
                    b.classList.add('text-indigo-600');
                }
            });

            if(pageId === 'home') renderHome();
            if(pageId === 'report') renderTransactions();
            
            // Set default date for forms
            const today = new Date().toISOString().split('T')[0];
            ['buy-date', 'sell-date', 'exp-date'].forEach(id => {
                const el = document.getElementById(id);
                if(el && !el.value) el.value = today;
            });
            
            window.scrollTo(0, 0);
        }

        function saveEntry(type) {
            let data = { id: Date.now(), type: type, date: '', name: '', qty: 0, total: 0, paid: 0, due: 0 };
            
            if(type === 'buy') {
                data.date = document.getElementById('buy-date').value;
                data.name = document.getElementById('buy-name').value || 'মহাজন';
                data.qty = parseFloat(document.getElementById('buy-qty').value) || 0;
                data.total = parseFloat(document.getElementById('buy-total').value) || 0;
                data.paid = parseFloat(document.getElementById('buy-paid').value) || 0;
                data.due = data.total - data.paid;
            } else if(type === 'sell') {
                data.date = document.getElementById('sell-date').value;
                data.name = document.getElementById('sell-name').value || 'ক্রেতা';
                data.qty = parseFloat(document.getElementById('sell-qty').value) || 0;
                data.total = parseFloat(document.getElementById('sell-total').value) || 0;
                data.paid = parseFloat(document.getElementById('sell-rec').value) || 0;
                data.due = data.total - data.paid;
            } else if(type === 'expense') {
                data.date = document.getElementById('exp-date').value;
                data.name = document.getElementById('exp-name').value || 'খরচ';
                data.total = parseFloat(document.getElementById('exp-amount').value) || 0;
                data.paid = data.total;
                data.due = 0;
            }

            if(!data.date) return alert('তারিখ দিন!');
            
            transactions.unshift(data);
            localStorage.setItem('token_khata_pro_pwa', JSON.stringify(transactions));
            
            // Clear inputs
            document.querySelectorAll('input:not([type="date"])').forEach(i => i.value = '');
            alert('সফলভাবে সেভ হয়েছে!');
            navigate('home');
        }

        function formatCurrency(num) {
            return '৳ ' + Math.round(num).toLocaleString('bn-BD');
        }

        function renderHome() {
            let cash = 0, profit = 0, dena = 0, paona = 0, stock = 0, buyTotal = 0, buyQty = 0;
            let people = {};

            transactions.forEach(t => {
                if(t.type === 'buy') {
                    buyTotal += t.total; buyQty += t.qty;
                }
            });
            let avgCost = buyQty > 0 ? buyTotal / buyQty : 0;

            transactions.forEach(t => {
                if(t.name) {
                    if(!people[t.name]) people[t.name] = { due: 0, type: t.type === 'buy' ? 'Mahajan' : 'Customer' };
                    people[t.name].due += (t.due || 0);
                }

                if(t.type === 'buy') {
                    cash -= t.paid; dena += t.due; stock += t.qty;
                } else if(t.type === 'sell') {
                    cash += t.paid; paona += t.due; stock -= t.qty;
                    profit += (t.total - (t.qty * avgCost));
                } else {
                    cash -= t.total; profit -= t.total;
                }
            });

            document.getElementById('m-stock').innerText = stock;
            document.getElementById('m-cash').innerText = formatCurrency(cash);
            document.getElementById('m-profit').innerText = formatCurrency(profit);
            document.getElementById('m-dena').innerText = formatCurrency(dena);
            document.getElementById('m-paona').innerText = formatCurrency(paona);

            // Render Balances
            let balanceHtml = '';
            Object.entries(people).forEach(([name, info]) => {
                if(info.due > 0) {
                    balanceHtml += `
                        <div class="bg-white p-4 rounded-2xl border border-slate-100 flex items-center justify-between shadow-sm">
                            <div class="flex items-center gap-3">
                                <div class="p-2 rounded-lg ${info.type === 'Mahajan' ? 'bg-rose-50 text-rose-600' : 'bg-amber-50 text-amber-600'}">
                                    <i data-lucide="user" class="w-4 h-4"></i>
                                </div>
                                <div class="text-left">
                                    <p class="font-bold text-slate-800 text-sm">${name}</p>
                                    <p class="text-[9px] uppercase font-bold text-slate-400">${info.type === 'Mahajan' ? 'মহাজন (বকেয়া)' : 'কাস্টমার (পাওনা)'}</p>
                                </div>
                            </div>
                            <p class="font-extrabold ${info.type === 'Mahajan' ? 'text-rose-600' : 'text-amber-600'} text-sm">${formatCurrency(info.due)}</p>
                        </div>
                    `;
                }
            });
            document.getElementById('balance-list').innerHTML = balanceHtml || '<p class="text-center text-slate-400 text-xs py-10 bg-white rounded-3xl border border-dashed border-slate-200">কোন বকেয়া নেই</p>';
            lucide.createIcons();
        }

        function renderTransactions() {
            const search = document.getElementById('search-input').value.toLowerCase();
            let html = '';
            const filtered = transactions.filter(t => t.name.toLowerCase().includes(search));
            
            document.getElementById('res-count').innerText = filtered.length + ' টি';

            filtered.forEach(t => {
                const colors = { buy: 'rose', sell: 'emerald', expense: 'indigo' }[t.type];
                const labels = { buy: 'ক্রয়', sell: 'বিক্রি', expense: 'খরচ' }[t.type];
                const icons = { buy: 'plus-circle', sell: 'minus-circle', expense: 'wallet' }[t.type];

                html += `
                    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 flex items-center justify-between active:bg-slate-50 transition-colors">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl bg-${colors}-50 text-${colors}-600 flex items-center justify-center">
                                <i data-lucide="${icons}" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <h4 class="font-bold text-slate-800 text-sm">${t.name} <span class="text-[10px] font-normal text-slate-400">(${labels})</span></h4>
                                <div class="flex items-center gap-2 mt-0.5 text-[10px] text-slate-400 font-medium">
                                    <i data-lucide="clock" class="w-3 h-3"></i> ${t.date}
                                    ${t.qty > 0 ? \`<span class="bg-slate-100 px-1 rounded font-bold">\${t.qty} টি</span>\` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-sm text-${colors}-600">${formatCurrency(t.total)}</p>
                            ${t.due > 0 ? \`<p class="text-[8px] bg-rose-50 text-rose-500 px-1 py-0.5 rounded-full font-bold">বাকি \${formatCurrency(t.due)}</p>\` : ''}
                        </div>
                    </div>
                `;
            });
            document.getElementById('history-container').innerHTML = html || '<p class="text-center py-10 text-slate-400">লেনদেন পাওয়া যায়নি</p>';
            lucide.createIcons();
        }

        function downloadCSV() {
            if(!transactions.length) return alert('ডাটা নেই!');
            let csv = "Date,Type,Name,Qty,Total,Paid,Due\\n";
            transactions.forEach(t => csv += `\${t.date},\${t.type},\${t.name},\${t.qty},\${t.total},\${t.paid},\${t.due}\\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'Token_Khata_Pro.csv'; a.click();
        }

        function clearAllData() {
            if(confirm('সব ডাটা মুছে যাবে। আপনি নিশ্চিত?')) {
                transactions = [];
                localStorage.removeItem('token_khata_pro_pwa');
                navigate('home');
            }
        }

        function downloadApp() {
            const html = document.documentElement.outerHTML;
            const blob = new Blob([html], { type: 'text/html' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Token_Khata_Pro_v3.html';
            a.click();
            window.URL.revokeObjectURL(url);
        }

        window.onload = () => {
            lucide.createIcons();
            renderHome();
        };
    </script>
</body>
